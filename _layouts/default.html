<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.data.site.title }}{% else %}{{ site.data.site.title }}: {{ site.data.site.tagline }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.data.site.description }}{% endif %}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.data.site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.data.site.description }}{% endif %}">
  <meta property="og:image" content="{{ site.data.site.url }}{% if page.image %}{{ page.image }}{% else %}/assets/images/og-image.png{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.data.site.url }}{{ page.url }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="{{ site.data.site.twitter_handle }}">

  <!-- Canonical -->
  <link rel="canonical" href="{{ site.data.site.url }}{{ page.url }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Site stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Favicon -->
  <link rel="icon" href="{{ '/assets/images/logo/favicon.png' | relative_url }}" type="image/png">

  {% seo %}
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  {% include header.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Plausible analytics (privacy-friendly, no cookies) -->
  {% if site.data.site.plausible_domain and jekyll.environment == "production" %}
  <script defer data-domain="{{ site.data.site.plausible_domain }}" src="https://plausible.io/js/script.js"></script>
  {% endif %}

</body>
</html>
