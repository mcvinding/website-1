hero:
  headline: "Fundamentals of Open & Rigorous EEG Science"
  strapline: >
    A coordinated European network unifying standardised methodologies,
    FAIR data sharing, and inclusive training — 101 years after the discovery of EEG.
  cta_primary:
    label: "Join the network"
    url: "/join/"
  cta_secondary:
    label: "Learn More"
    url: "/#about"
  cta_tertiary:
    label: "Resources"
    url: "/resources/"

about:
  heading: "About EEG101"
  intro: >
    Electroencephalography (EEG) is the most widely used functional brain imaging
    modality worldwide, yet the field is held back by substantial fragmentation —
    in hardware, protocols, analytical workflows, and access to training.
  body: >
    EEG101 is a COST Action network launched in 2025, exactly 101 years after Hans
    Berger's discovery of EEG. Bringing together researchers from across Europe and
    beyond, EEG101 addresses the fragmentation that limits collaboration, data sharing,
    and reproducibility in EEG research.
  mission: >
    Our mission is to establish a coordinated, open, and collaborative network that
    harmonises methodologies, improves data accessibility, and provides equitable
    training opportunities — establishing Europe as a global leader in open EEG science.
  cost_explainer: >
    COST (European Cooperation in Science and Technology) is a funding agency for
    research and innovation networks. EEG101 (Action CA24148) is funded through
    Horizon Europe.
  inclusion: >
    EEG101 is committed to equity and inclusion. We provide dedicated funding for
    Young Researchers & Innovators (YRIs) and researchers from Inclusiveness Target
    Countries (ITCs). An Inclusivity Monitoring Committee ensures our community
    reflects the diversity of European science.
  cta:
    label: "Meet the team"
    url: "/coordination/"

objectives:
  heading: "Our approach"
  intro: >
    EEG101 works across three interconnected pillars to advance open and rigorous
    EEG science across Europe.
  items:
    - icon: "📐"
      image: "/assets/images/objectives/standardise.png"
      title: "Standardise"
      body: >
        Develop and disseminate standardised reporting guidelines, pre-registration
        templates, and analytical workflows to promote consistency and reproducibility
        across European EEG laboratories.
    - icon: "🔗"
      image: "/assets/images/objectives/integrate.png"
      title: "Integrate"
      body: >
        Build a centralised platform hosting a meta-directory of FAIR-compliant
        datasets, standardised pipelines, and a database of open-source software
        tools — making EEG data accessible and interoperable.
    - icon: "🚀"
      image: "/assets/images/objectives/advance.png"
      title: "Advance"
      body: >
        Drive innovation through Short-Term Scientific Missions, Virtual Mobility
        Grants, and a distributed conference model — building capacity
        and connecting the next generation of EEG researchers.
    - icon: "🌍"
      image: "/assets/images/objectives/collaborate.png"
      title: "Collaborate"
      body: >
        Connect researchers across disciplines, countries, and sectors. EEG101 builds
        on the extensive networks of existing initiatives engaging over 3,000 scientists
        worldwide.
    - icon: "🎓"
      image: "/assets/images/objectives/capacity.png"
      title: "Capacity-build"
      body: >
        Prioritise Young Researchers & Innovators and researchers from Inclusiveness
        Target Countries through dedicated funding, mentorship,
        and open training materials.

