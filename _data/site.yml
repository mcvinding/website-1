title: "EEG101"
tagline: "Fundamentals of Open & Rigorous EEG Science"
description: >
  A COST Action network bringing together European EEG researchers to establish
  standardised methodologies, FAIR data-sharing platforms, and inclusive
  training resources — enhancing scientific rigour and global leadership in EEG science.

action_number: CA24148
action_start_year: 2025
