# Partner organisations and initiatives.
# Add logos to assets/images/partners/ — recommended size 300×180px, transparent PNG or JPG.

- id: eegmanylabs
  name: "#EEGManyLabs"
  description: "Large-scale multi-site replication of 20 influential EEG studies across >230 laboratories from 32 countries."
  url: "https://www.eegmanylabs.org"
  logo: "/assets/images/partners/eegmanylabs-logo.png"
  type: "initiative"

- id: cuttingeeg
  name: "CuttingEEG"
  description: "Community association promoting cutting-edge EEG methods through the CuttingGardens distributed conference model."
  url: "https://cuttingeeg.org"
  logo: "/assets/images/partners/cuttingeeg-logo.png"
  type: "initiative"

- id: indos
  name: "INDOS COST Action"
  description: "COST Action investigating individual differences in oscillatory neural dynamics and their functional consequences."
  url: "https://www.indos-costaction.eu"
  logo: "/assets/images/partners/indos-logo.png"
  type: "initiative"

- id: global-brain-consortium
  name: "Global Brain Consortium"
  description: "International network promoting diversity and inclusion in neuroscience research across the globe."
  url: "https://globalbrainconsortium.org"
  logo: "/assets/images/partners/gbc-logo.png"
  type: "initiative"

- id: fieldtrip
  name: "FieldTrip"
  description: "Open-source MATLAB toolbox for advanced analysis of MEG, EEG, and invasive electrophysiological data."
  url: "https://www.fieldtriptoolbox.org"
  logo: "/assets/images/partners/fieldtrip-logo.png"
  type: "tool"

- id: artem-is
  name: "ARTEM-IS"
  description: "INCF-developed standardised reporting tools for EEG research, providing web-based guidance forms for experimental documentation."
  url: "https://artemis.incf.org/about"
  logo: "/assets/images/partners/artemis-logo.png"
  type: "tool"

- id: african-brain-data
  name: "African Brain Data Network"
  description: "Network promoting open, FAIR neuroscience data from African research sites to advance globally representative brain science."
  url: "https://africanbraindatanetwork.com"
  logo: "/assets/images/partners/abdn-logo.png"
  type: "initiative"

- id: eegnet
  name: "EEGNet"
  description: "EEGNet is an initiative that facilitates national and international collaborative EEG-based neuroscience research. At the core of EEGNet is the development of a scalable neuroinformatics hub for data sharing and analytics for the investigation of biomarkers of brain disorders."
  url: "https://eegnet.org"
  logo: "/assets/images/partners/eegnet-logo.png"
  type: "initiative"
