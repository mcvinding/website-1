# News items — most recent first.
# Every card MUST have an image. Place images in assets/images/news/
# Recommended size: 800×450px (16:9), JPEG or WebP.
#
# Fields:
#   title       — headline (required)
#   date        — YYYY-MM-DD (required)
#   category    — e.g. Announcement | Grants | Events | Research | Community
#   summary     — 1–3 sentences shown on the card (required)
#   image       — path to image in assets/images/news/ (required)
#   alt         — descriptive alt text for the image (required)
#   featured    — true/false (featured items appear first)
#   external_url — if set, card links to this external page
#   internal_url — if set, card links to this internal page (relative path)
#   button_label — optional CTA label (default: "Read more")
#   tags        — list of tags

- title: "Round 1 grants open: STSMs, VMGs, and Conference Grants"
  date: 2026-03-01
  category: "Grants"
  summary: >
    Applications are now open for Round 1 Short-Term Scientific Missions,
    Virtual Mobility Grants, and Conference Grants. The deadline is
    31 October 2026, 17:00 CET. Decisions will be announced by 30 April 2026.
  image: "/assets/images/news/grants-round1.jpg"
  alt: "EEG101 grant schemes open for applications"
  featured: true
  external_url: ""
  internal_url: "/grants/"
  button_label: "View grants"
  tags:
    - grants
    - STSM
    - VMG

- title: "Virtual working group meeting: EEG data curation and harmonisation"
  date: 2026-04-13
  category: "Events"
  summary: >
    WG2 hosts a virtual meeting on 13 April 2026 to discuss current approaches
    to EEG data curation and harmonisation. All network members are welcome.
    Connection details shared via Discord.
  image: "/assets/images/news/wg2-meeting-april2026.jpg"
  alt: "Virtual meeting connecting EEG researchers across Europe"
  featured: false
  external_url: ""
  internal_url: "/events/"
  button_label: "Event details"
  tags:
    - working-groups
    - WG2
    - events

- title: "First in-person Management Committee meeting in Brussels"
  date: 2025-09-01
  category: "Announcement"
  summary: >
    EEG101's Management Committee held its first in-person meeting in Brussels
    in September 2025, bringing together representatives from 24 COST Full Member
    countries to launch the Action's scientific programme.
  image: "/assets/images/news/brussels-mc-meeting.jpg"
  alt: "EEG101 Management Committee first in-person meeting Brussels 2025"
  featured: false
  external_url: ""
  internal_url: ""
  button_label: "Read more"
  tags:
    - management-committee
    - milestone

- title: "EEG101 COST Action approved by COST Committee"
  date: 2025-05-20
  category: "Announcement"
  summary: >
    The COST Committee officially approved EEG101 (CA24148) on 20 May 2025,
    marking the start of a four-year pan-European network dedicated to open
    and rigorous EEG science.
  image: "/assets/images/news/cost-approval.jpg"
  alt: "COST Action approval announcement for EEG101"
  featured: false
  external_url: ""
  internal_url: ""
  button_label: "Read more"
  tags:
    - milestone
    - announcement

